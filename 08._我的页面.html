<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维词APP - 我的页面优化版</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-frame { 
            width: 375px; 
            height: 667px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部 */
        .header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        /* 用户信息 */
        .user-info {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #007aff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .user-details {
            flex: 1;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        
        .user-stats {
            font-size: 14px;
            color: #666;
        }
        
        /* 功能列表 */
        .function-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .function-section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .function-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .function-item:hover {
            border-color: #007aff;
            background: #f8f9fa;
        }
        
        .function-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
        }
        
        .function-content {
            flex: 1;
        }
        
        .function-name {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }
        
        .function-desc {
            font-size: 12px;
            color: #666;
        }
        
        .function-arrow {
            font-size: 14px;
            color: #999;
        }
        
        /* 词书更换特殊样式 */
        .book-change {
            background: #e7f3ff;
            border-color: #007aff;
        }
        
        .book-change .function-icon {
            background: #007aff;
            color: white;
        }
        
        /* 设置入口 */
        .settings-item {
            border-top: 1px solid #eee;
            margin-top: 20px;
            padding-top: 20px;
        }
        
        /* 导航栏 */
        .nav-bar {
            height: 56px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        .nav-label {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="app-frame">
        <!-- 头部 -->
        <div class="header">
            <div class="page-title">我的</div>
        </div>
        
        <!-- 用户信息 -->
        <div class="user-info">
            <div class="avatar">张</div>
            <div class="user-details">
                <div class="user-name">张三同学</div>
                <div class="user-stats">已学习28天 · 掌握1248词 · 连续学习28天</div>
            </div>
        </div>
        
        <!-- 功能列表 -->
        <div class="function-list">
            <!-- 学习管理 -->
            <div class="function-section">
                <div class="section-title">学习管理</div>
                
                <div class="function-item" onclick="goToStudyPlan()">
                    <div class="function-icon" style="background: #e7f3ff; color: #007aff;">📅</div>
                    <div class="function-content">
                        <div class="function-name">学习计划</div>
                        <div class="function-desc">查看和调整学习进度</div>
                    </div>
                    <div class="function-arrow">→</div>
                </div>
                
                <div class="function-item" onclick="goToWrongQuestions()">
                    <div class="function-icon" style="background: #f8d7da; color: #721c24;">❌</div>
                    <div class="function-content">
                        <div class="function-name">错题本</div>
                        <div class="function-desc">24道错题待复习</div>
                    </div>
                    <div class="function-arrow">→</div>
                </div>
                
                <div class="function-item" onclick="goToDiagnosisReport()">
                    <div class="function-icon" style="background: #d4edda; color: #155724;">📊</div>
                    <div class="function-content">
                        <div class="function-name">诊断报告</div>
                        <div class="function-desc">上次得分：118分</div>
                    </div>
                    <div class="function-arrow">→</div>
                </div>
            </div>
            
            <!-- 词书管理 -->
            <div class="function-section">
                <div class="section-title">词书管理</div>
                
                <div class="function-item book-change" onclick="goToBookChange()">
                    <div class="function-icon">📚</div>
                    <div class="function-content">
                        <div class="function-name">词书更换</div>
                        <div class="function-desc">当前：人教版高中英语</div>
                    </div>
                    <div class="function-arrow">→</div>
                </div>
            </div>
            
            <!-- 设置 -->
            <div class="function-section">
                <div class="section-title">设置</div>
                
                <div class="function-item" onclick="goToSettings()">
                    <div class="function-icon" style="background: #f8f9fa; color: #666;">⚙️</div>
                    <div class="function-content">
                        <div class="function-name">设置</div>
                        <div class="function-desc">个人信息、学习提醒、隐私设置</div>
                    </div>
                    <div class="function-arrow">→</div>
                </div>
            </div>
        </div>
        
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-item">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">首页</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📚</div>
                <div class="nav-label">学习</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">💪</div>
                <div class="nav-label">练习</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">👤</div>
                <div class="nav-label">我的</div>
            </div>
        </div>
    </div>
    
    <script>
        // 功能跳转
        function goToStudyPlan() {
            console.log("跳转到学习计划页面");
            alert("跳转到学习计划页面");
            // window.location.href = 'study_plan.html';
        }
        
        function goToWrongQuestions() {
            console.log("跳转到错题本页面");
            alert("跳转到错题本页面");
            // window.location.href = 'wrong_questions_list.html';
        }
        
        function goToDiagnosisReport() {
            console.log("跳转到诊断报告页面");
            alert("跳转到诊断报告页面");
            // window.location.href = '04_诊断报告页.html';
        }
        
        function goToBookChange() {
            console.log("跳转到词书选择页面");
            alert("跳转到词书选择页面");
            // window.location.href = '09.1_词书选择页面.html';
        }
        
        function goToSettings() {
            console.log("跳转到设置页面");
            alert("跳转到设置页面\n包含：个人信息修改、学习提醒、隐私设置");
            // window.location.href = 'settings.html';
        }
        
        console.log("🎯 我的页面改进特点：");
        console.log("1. 功能对应页面：学习计划、错题本、诊断报告都有对应页面");
        console.log("2. 设置入口：包含个人信息、学习提醒、隐私设置");
        console.log("3. 词书更换：直接跳转到09.1词书选择页面");
        console.log("4. 视觉优化：词书更换特殊样式突出显示");
        console.log("5. 用户信息：显示学习天数、掌握词汇数、连续学习天数");
    </script>
</body>
</html>
