<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维词APP - 练习页（极简模式）</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-frame { 
            width: 375px; 
            height: 667px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部 */
        .header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-align: center;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 今日复习卡片 */
        .review-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 300px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .review-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .review-number {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            line-height: 1;
        }
        
        .review-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }
        
        /* 复习统计 */
        .stats-section {
            width: 100%;
            max-width: 300px;
            margin-bottom: 30px;
        }
        
        .stats-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .stats-list {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .stat-value.highlight {
            color: #28a745;
        }
        
        /* 错题本入口 */
        .wrongbook-entry {
            width: 100%;
            max-width: 300px;
        }
        
        .wrongbook-btn {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 16px;
            padding: 16px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .wrongbook-btn:hover {
            border-color: #007aff;
            background: #f8f9fa;
        }
        
        /* 智能安排说明 */
        .smart-arrangement {
            margin-top: 20px;
            padding: 16px;
            background: #e7f3ff;
            border-radius: 12px;
            font-size: 13px;
            color: #007aff;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }
        
        /* 导航栏 */
        .nav-bar {
            height: 56px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        .nav-label {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="app-frame">
        <!-- 头部 -->
        <div class="header">
            <div class="page-title">练习</div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 今日复习卡片 -->
            <div class="review-card">
                <div class="review-title">今日复习</div>
                <div class="review-number">24</div>
                <div class="review-label">待复习单词数量</div>
                <button class="start-btn" onclick="startReview()">
                    <span>🚀</span>
                    <span>开始复习</span>
                </button>
            </div>
            
            <!-- 复习统计 -->
            <div class="stats-section">
                <div class="stats-title">📊 复习统计</div>
                <div class="stats-list">
                    <div class="stat-item">
                        <div class="stat-label">今日已完成</div>
                        <div class="stat-value highlight">12/24</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">连续复习</div>
                        <div class="stat-value">8天</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">预计用时</div>
                        <div class="stat-value">15分钟</div>
                    </div>
                </div>
            </div>
            
            <!-- 错题本入口 -->
            <div class="wrongbook-entry">
                <button class="wrongbook-btn" onclick="viewWrongbook()">
                    <span>📚</span>
                    <span>查看全部错题本</span>
                </button>
            </div>
            
            <!-- 智能安排说明 -->
            <div class="smart-arrangement">
                📈 复习内容由系统智能安排<br>
                （基于诊断结果 + 错题记录 + 艾宾浩斯记忆曲线）
            </div>
        </div>
        
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-item">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">首页</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📚</div>
                <div class="nav-label">学习</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">💪</div>
                <div class="nav-label">练习</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">👤</div>
                <div class="nav-label">我的</div>
            </div>
        </div>
    </div>
    
    <script>
        // 开始复习
        function startReview() {
            console.log("开始今日复习");
            
            // 显示加载状态
            const startBtn = document.querySelector('.start-btn');
            const originalText = startBtn.textContent;
            startBtn.textContent = '准备中...';
            startBtn.disabled = true;
            
            // 模拟智能安排过程
            setTimeout(() => {
                alert("🎯 智能复习安排完成！\n\n今日复习内容：\n• 易错词汇专项：8词\n• 熟词生义巩固：6词\n• 必考词汇复习：10词\n\n基于：诊断结果 + 7天错题 + 记忆曲线");
                
                // 跳转到复习页面
                // window.location.href = 'review_session.html';
                
                // 恢复按钮状态
                startBtn.textContent = originalText;
                startBtn.disabled = false;
                
                // 更新统计
                updateStats();
            }, 1500);
        }
        
        // 更新统计
        function updateStats() {
            // 模拟更新进度
            const progress = document.querySelector('.stat-value.highlight');
            if (progress) {
                progress.textContent = '13/24';
            }
            
            // 更新待复习数量
            const reviewNumber = document.querySelector('.review-number');
            if (reviewNumber) {
                reviewNumber.textContent = '23';
            }
            
            console.log("统计已更新");
        }
        
        // 查看错题本
        function viewWrongbook() {
            console.log("查看全部错题本");
            alert("跳转到错题本列表页面");
            // window.location.href = '07.1_错题本列表.html';
        }
        
        // 智能安排算法说明
        console.log("🎯 极简练习页设计特点：");
        console.log("1. 墨墨风格：唯一大按钮'开始复习'，用户打开即点");
        console.log("2. 扇贝统计：清晰的复习统计数据");
        console.log("3. 智能安排：基于诊断结果+错题+记忆曲线");
        console.log("4. 视觉焦点：大数字24突出显示");
        console.log("5. 极简操作：减少用户决策，直接开始学习");
        
        // 模拟智能安排算法
        const smartArrangement = {
            basedOn: [
                "诊断结果（标签薄弱点）",
                "最近7天错题记录", 
                "艾宾浩斯记忆曲线",
                "学习时间偏好"
            ],
            generatePlan: function() {
                return {
                    easyWords: 8,    // 易错词汇
                    familiarWords: 6, // 熟词生义  
                    mustKnowWords: 10 // 必考词汇
                };
            }
        };
        
        console.log("智能安排算法：", smartArrangement);
    </script>
</body>
</html>
