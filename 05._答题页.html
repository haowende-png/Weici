<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维词APP - 答题页（即时反馈）</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-frame { 
            width: 375px; 
            height: 667px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部 */
        .header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .progress {
            font-size: 14px;
            color: #666;
        }
        
        .progress-bar {
            width: 100px;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            background: #007aff;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* 单词显示 */
        .word-display {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .word {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .pronunciation {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .speaker-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        
        /* 标签 */
        .tags-simple {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        
        .tag-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 11px;
            color: #666;
        }
        
        /* 题目 */
        .question {
            font-size: 18px;
            margin: 20px 0 30px;
            line-height: 1.5;
            text-align: center;
            color: #333;
        }
        
        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .option {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .option:hover:not(.correct):not(.wrong):not(.correct-highlight) {
            background: #f8f9fa;
        }
        
        /* 正确选项 */
        .option.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }
        
        /* 错误选项 */
        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 正确答案高亮（当用户选错时） */
        .option.correct-highlight {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
            animation: pulse 1s;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        /* 继续按钮 */
        .continue-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        
        .continue-btn.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 反馈信息 */
        .feedback {
            text-align: center;
            margin-top: 16px;
            min-height: 24px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .feedback.correct {
            color: #28a745;
        }
        
        .feedback.wrong {
            color: #dc3545;
        }
        
        /* 导航栏 */
        .nav-bar {
            height: 56px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
        }
        
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        
        .nav-label {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="app-frame">
        <!-- 头部 -->
        <div class="header">
            <div>
                <div class="progress" id="progressText">第5词/20词</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 25%"></div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 单词显示 -->
            <div class="word-display">
                <div class="word" id="word">abandon</div>
                <div class="pronunciation" id="pronunciation">/əˈbændən/</div>
                <button class="speaker-btn" onclick="playAudio()">🔊</button>
                
                <div class="tags-simple">
                    <div class="tag-item" style="background: #e7f3ff; color: #007aff;">必考词汇</div>
                    <div class="tag-item" style="background: #fff3cd; color: #856404;">高频词汇</div>
                    <div class="tag-item" style="background: #f8d7da; color: #721c24;">易错词汇</div>
                </div>
            </div>
            
            <!-- 题目 -->
            <div class="question">请选择单词的正确释义：</div>
            
            <!-- 选项 -->
            <div class="options" id="options">
                <div class="option" data-index="0" data-correct="true">
                    v. 放弃，抛弃
                </div>
                <div class="option" data-index="1">
                    n. 能力，才能
                </div>
                <div class="option" data-index="2">
                    adj. 绝对的，完全的
                </div>
                <div class="option" data-index="3">
                    v. 吸收，吸引
                </div>
            </div>
            
            <!-- 反馈信息 -->
            <div class="feedback" id="feedback"></div>
            
            <!-- 继续按钮 -->
            <button class="continue-btn" id="continueBtn" onclick="nextWord()">
                继续
            </button>
        </div>
        
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-item">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">首页</div>
            </div>
            <div class="nav-item active">
                <div class="nav-icon">📚</div>
                <div class="nav-label">学习</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">💪</div>
                <div class="nav-label">练习</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">👤</div>
                <div class="nav-label">我的</div>
            </div>
        </div>
    </div>
    
    <script>
        // 学习数据
        const learningData = {
            currentWord: 5,
            totalWords: 20,
            wrongAnswers: [] // 记录错题
        };
        
        let selectedOption = null;
        let answered = false;
        
        // 初始化
        function init() {
            updateProgress();
        }
        
        // 更新进度
        function updateProgress() {
            const progress = (learningData.currentWord / learningData.totalWords * 100).toFixed(0);
            document.getElementById('progressText').textContent = `第${learningData.currentWord}词/${learningData.totalWords}词`;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }
        
        // 播放音频
        function playAudio() {
            console.log("播放单词发音");
            // 实际：调用TTS API播放发音
        }
        
        // 选择选项
        function selectOption(element) {
            if (answered) return;
            
            selectedOption = parseInt(element.getAttribute('data-index'));
            const isCorrect = element.getAttribute('data-correct') === 'true';
            
            // 立即验证答案
            validateAnswer(isCorrect);
        }
        
        // 验证答案
        function validateAnswer(isCorrect) {
            answered = true;
            
            const options = document.querySelectorAll('.option');
            const correctIndex = Array.from(options).findIndex(opt => opt.getAttribute('data-correct') === 'true');
            
            // 标记用户选择的选项
            options[selectedOption].classList.add(isCorrect ? 'correct' : 'wrong');
            
            // 如果选错了，高亮正确答案
            if (!isCorrect) {
                options[correctIndex].classList.add('correct-highlight');
                
                // 记录错题
                recordWrongAnswer();
                
                document.getElementById('feedback').textContent = "回答错误";
                document.getElementById('feedback').className = "feedback wrong";
            } else {
                document.getElementById('feedback').textContent = "回答正确！";
                document.getElementById('feedback').className = "feedback correct";
            }
            
            // 显示继续按钮
            setTimeout(() => {
                document.getElementById('continueBtn').classList.add('show');
            }, 500);
            
            // 禁用所有选项
            options.forEach(opt => {
                opt.style.cursor = 'default';
            });
        }
        
        // 记录错题
        function recordWrongAnswer() {
            const word = document.getElementById('word').textContent;
            const pronunciation = document.getElementById('pronunciation').textContent;
            const userAnswer = document.querySelectorAll('.option')[selectedOption].textContent;
            const correctAnswer = document.querySelector('.option[data-correct="true"]').textContent;
            
            learningData.wrongAnswers.push({
                word: word,
                pronunciation: pronunciation,
                userAnswer: userAnswer,
                correctAnswer: correctAnswer,
                timestamp: new Date().toISOString()
            });
            
            console.log("记录错题：", learningData.wrongAnswers[learningData.wrongAnswers.length - 1]);
            console.log("总错题数：", learningData.wrongAnswers.length);
            
            // 实际：保存到本地存储或发送到服务器
            localStorage.setItem('wrongAnswers', JSON.stringify(learningData.wrongAnswers));
        }
        
        // 下一个单词
        function nextWord() {
            if (!answered) return;
            
            // 更新进度
            learningData.currentWord++;
            
            // 如果是最后一个单词，循环到第一个
            if (learningData.currentWord > learningData.totalWords) {
                learningData.currentWord = 1;
                alert("🎉 已完成本轮学习！是否重新开始？");
            }
            
            // 重置状态
            resetQuestion();
            
            // 更新单词内容（这里简化，实际应该从API获取）
            updateWordContent();
            
            updateProgress();
        }
        
        // 重置题目状态
        function resetQuestion() {
            selectedOption = null;
            answered = false;
            
            // 清除选项状态
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('correct', 'wrong', 'correct-highlight');
                opt.style.cursor = 'pointer';
            });
            
            // 清除反馈
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            
            // 隐藏继续按钮
            document.getElementById('continueBtn').classList.remove('show');
        }
        
        // 更新单词内容（模拟）
        function updateWordContent() {
            // 模拟不同的单词
            const words = [
                { word: "ability", pronunciation: "/əˈbɪləti/", correct: "n. 能力，才能" },
                { word: "absolute", pronunciation: "/ˈæbsəluːt/", correct: "adj. 绝对的，完全的" },
                { word: "absorb", pronunciation: "/əbˈzɔːrb/", correct: "v. 吸收，吸引" },
                { word: "abundant", pronunciation: "/əˈbʌndənt/", correct: "adj. 丰富的，充裕的" }
            ];
            
            const randomWord = words[Math.floor(Math.random() * words.length)];
            
            document.getElementById('word').textContent = randomWord.word;
            document.getElementById('pronunciation').textContent = randomWord.pronunciation;
            
            // 更新选项（这里简化，实际应该生成随机选项）
            const options = document.querySelectorAll('.option');
            options[0].textContent = randomWord.correct;
            options[0].setAttribute('data-correct', 'true');
            
            // 其他选项设为错误
            for (let i = 1; i < options.length; i++) {
                options[i].setAttribute('data-correct', 'false');
                // 实际：应该生成合理的错误选项
            }
        }
        
        // 事件委托
        document.getElementById('options').addEventListener('click', (e) => {
            if (e.target.classList.contains('option') && !answered) {
                selectOption(e.target);
            }
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (answered) return;
            
            // 数字键1-4选择选项
            if (e.code >= 'Digit1' && e.code <= 'Digit4') {
                const index = parseInt(e.code.slice(-1)) - 1;
                const option = document.querySelector(`.option[data-index="${index}"]`);
                if (option) selectOption(option);
            }
            
            // 空格键播放发音
            if (e.code === 'Space') {
                e.preventDefault();
                playAudio();
            }
        });
        
        // 初始化
        init();
        
        console.log("🎯 答题页改进特点：");
        console.log("1. 即时反馈：选择后立即判断对错");
        console.log("2. 视觉反馈：正确变绿，错误变红，正确答案高亮");
        console.log("3. 自动记录：答错后自动记录错题");
        console.log("4. 自动继续：验证后自动出现'继续'按钮");
        console.log("5. 进度显示：显示当前单词序号/总数");
        console.log("6. 循环学习：学完最后一个回到第一个");
        console.log("7. 键盘支持：数字键1-4选择，空格播放发音");
        console.log("8. 错题存储：错题保存到localStorage");
    </script>
</body>
</html>
