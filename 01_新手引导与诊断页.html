<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维词APP - 新手引导与诊断</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-frame { 
            width: 375px; 
            height: 667px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* 品牌区 */
        .brand-section {
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        
        .app-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .app-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .app-slogan {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* 设置标题 */
        .setup-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .setup-subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        
        /* 设置选项 */
        .setup-options {
            margin-bottom: 40px;
        }
        
        .option-group {
            margin-bottom: 24px;
        }
        
        .option-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .option-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .option-btn {
            padding: 14px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            text-align: center;
        }
        
        .option-btn.selected {
            border-color: #007aff;
            background: #f8fbff;
            color: #007aff;
            font-weight: 600;
        }
        
        /* 诊断说明 */
        .diagnosis-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .diagnosis-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .diagnosis-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }
        
        /* 开始按钮 */
        .start-section {
            margin-top: auto;
        }
        
        .start-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 跳过提示 */
        .skip-hint {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-frame">
        <!-- 品牌区 -->
        <div class="brand-section">
            <div class="app-logo">📚</div>
            <div class="app-name">维词</div>
            <div class="app-slogan">高考英语智能学习系统</div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <div class="setup-title">快速设置</div>
            <div class="setup-subtitle">选择教材和年级，开始学习</div>
            
            <!-- 设置选项 -->
            <div class="setup-options">
                <div class="option-group">
                    <div class="option-label">
                        <span>📖</span>
                        <span>教材版本</span>
                    </div>
                    <div class="option-grid">
                        <button class="option-btn" onclick="selectOption('version', 'renjiao')">
                            人教版
                        </button>
                        <button class="option-btn" onclick="selectOption('version', 'waiyan')">
                            外研版
                        </button>
                        <button class="option-btn" onclick="selectOption('version', 'yilin')">
                            译林版
                        </button>
                        <button class="option-btn" onclick="selectOption('version', 'other')">
                            其他
                        </button>
                    </div>
                </div>
                
                <div class="option-group">
                    <div class="option-label">
                        <span>🎓</span>
                        <span>年级</span>
                    </div>
                    <div class="option-grid">
                        <button class="option-btn" onclick="selectOption('grade', 'gaoyi')">
                            高一
                        </button>
                        <button class="option-btn" onclick="selectOption('grade', 'gaoer')">
                            高二
                        </button>
                        <button class="option-btn" onclick="selectOption('grade', 'gaosan')">
                            高三
                        </button>
                        <button class="option-btn" onclick="selectOption('grade', 'graduate')">
                            已毕业
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 诊断说明 -->
            <div class="diagnosis-info">
                <div class="diagnosis-title">8题快速诊断</div>
                <div class="diagnosis-desc">
                    设置完成后，将开始8题诊断测试<br>
                    了解你的词汇水平，生成个性化学习计划
                </div>
            </div>
            
            <!-- 开始按钮 -->
            <div class="start-section">
                <button class="start-btn" id="startBtn" onclick="startDiagnosis()" disabled>
                    开始诊断测试
                </button>
                
                <div class="skip-hint" onclick="skipDiagnosis()">
                    跳过诊断，直接开始学习
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let userData = {
            version: null,
            grade: null
        };
        
        function selectOption(type, value) {
            // 清除同类型选项的选择状态
            const group = event.target.closest('.option-group');
            group.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // 设置新的选择
            event.target.classList.add('selected');
            userData[type] = value;
            
            console.log(`选择了：${type} = ${value}`);
            
            // 检查是否可以开始
            checkStartButton();
        }
        
        function checkStartButton() {
            const startBtn = document.getElementById('startBtn');
            if (userData.version && userData.grade) {
                startBtn.disabled = false;
                startBtn.textContent = `开始诊断测试（${getGradeText(userData.grade)}）`;
            } else {
                startBtn.disabled = true;
                startBtn.textContent = '开始诊断测试';
            }
        }
        
        function getGradeText(grade) {
            const gradeMap = {
                'gaoyi': '高一',
                'gaoer': '高二',
                'gaosan': '高三',
                'graduate': '已毕业'
            };
            return gradeMap[grade] || '';
        }
        
        function skipDiagnosis() {
            console.log("跳过诊断，使用默认设置");
            
            // 使用默认配置
            userData = {
                version: 'renjiao',
                grade: 'gaosan'
            };
            
            // 自动选择默认选项
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // 选择默认选项
            const defaultVersion = document.querySelector('.option-btn[onclick*="renjiao"]');
            const defaultGrade = document.querySelector('.option-btn[onclick*="gaosan"]');
            
            if (defaultVersion) defaultVersion.classList.add('selected');
            if (defaultGrade) defaultGrade.classList.add('selected');
            
            // 启用开始按钮
            checkStartButton();
            
            alert("已使用默认设置：人教版 · 高三\n可在个人中心修改");
            
            // 直接开始学习（跳过诊断）
            startLearning();
        }
        
        function startDiagnosis() {
            if (!userData.version || !userData.grade) {
                alert("请先选择教材版本和年级");
                return;
            }
            
            console.log("开始诊断测试，用户数据：", userData);
            
            // 保存用户数据
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // 显示加载状态
            const startBtn = document.getElementById('startBtn');
            startBtn.textContent = '准备题目中...';
            startBtn.disabled = true;
            
            // 模拟加载，然后跳转到诊断答题页
            setTimeout(() => {
                console.log("跳转到诊断答题页");
                alert(`✅ 设置完成！\n教材：${userData.version === 'renjiao' ? '人教版' : '外研版'}\n年级：${getGradeText(userData.grade)}\n\n开始8题诊断测试...`);
                
                // 实际跳转
                // window.location.href = '诊断答题页.html';
            }, 1000);
        }
        
        function startLearning() {
            console.log("跳过诊断，直接开始学习");
            
            // 保存用户数据
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // 跳转到首页
            setTimeout(() => {
                alert("跳过诊断，直接开始学习");
                // window.location.href = '04_新用户首页_新用户测试后.html';
            }, 500);
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // Enter 键开始诊断
            if (e.code === 'Enter' && userData.version && userData.grade) {
                e.preventDefault();
                startDiagnosis();
            }
            
            // ESC 键跳过诊断
            if (e.code === 'Escape') {
                e.preventDefault();
                skipDiagnosis();
            }
        });
        
        console.log("🎯 新手引导与诊断页特点：");
        console.log("1. 参考墨墨背单词：无中间诊断介绍页");
        console.log("2. 一体化设计：设置 + 诊断说明在同一页");
        console.log("3. 简洁流程：设置完成 → 直接开始诊断测试");
        console.log("4. 可跳过：可跳过诊断直接开始学习");
        console.log("5. 明确预期：告知用户接下来是8题诊断测试");
    </script>
</body>
</html>
