<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维词APP - 诊断答题</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app-frame { 
            width: 375px; 
            height: 667px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部 */
        .header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .progress {
            font-size: 14px;
            color: #666;
        }
        
        .progress-bar {
            width: 100px;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            background: #007aff;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        /* 内容区域 */
        .content {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* 题目 */
        .question {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            margin-bottom: 20px;
        }
        
        .word {
            font-size: 32px;
            font-weight: bold;
            color: #007aff;
            margin-bottom: 8px;
        }
        
        .pronunciation {
            font-size: 16px;
            color: #666;
        }
        
        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .option {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .option:hover:not(.correct):not(.wrong) {
            background: #f8f9fa;
        }
        
        /* 正确选项样式 */
        .option.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }
        
        /* 错误选项样式 */
        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 选中但未验证的选项 */
        .option.selected:not(.correct):not(.wrong) {
            border-color: #007aff;
            background: #f8fbff;
        }
        
        /* 下一题按钮 */
        .next-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        
        .next-btn.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* 反馈信息 */
        .feedback {
            text-align: center;
            margin-top: 16px;
            min-height: 24px;
        }
        
        .feedback.correct {
            color: #28a745;
            font-weight: 600;
        }
        
        .feedback.wrong {
            color: #dc3545;
        }
        
        /* 完成提示 */
        .completion {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-frame">
        <!-- 头部 -->
        <div class="header">
            <div>
                <div class="progress" id="progressText">诊断测试 · 第1题/10题</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 10%"></div>
                </div>
            </div>
        </div>
        
        <!-- 内容区域 -->
        <div class="content">
            <!-- 题目 -->
            <div class="question">
                <div class="question-text">请选择单词的正确释义：</div>
                <div class="word" id="word">abandon</div>
                <div class="pronunciation" id="pronunciation">/əˈbændən/</div>
            </div>
            
            <!-- 选项 -->
            <div class="options" id="options">
                <div class="option" data-index="0" data-correct="true">
                    v. 放弃，抛弃
                </div>
                <div class="option" data-index="1">
                    n. 能力，才能
                </div>
                <div class="option" data-index="2">
                    adj. 绝对的，完全的
                </div>
                <div class="option" data-index="3">
                    v. 吸收，吸引
                </div>
            </div>
            
            <!-- 反馈信息 -->
            <div class="feedback" id="feedback"></div>
            
            <!-- 下一题按钮 -->
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                下一题
            </button>
            
            <!-- 完成提示 -->
            <div class="completion" id="completion"></div>
        </div>
    </div>
    
    <script>
        // 测试数据
        const testData = [
            {
                word: "abandon",
                pronunciation: "/əˈbændən/",
                options: [
                    { text: "v. 放弃，抛弃", correct: true },
                    { text: "n. 能力，才能", correct: false },
                    { text: "adj. 绝对的，完全的", correct: false },
                    { text: "v. 吸收，吸引", correct: false }
                ]
            },
            {
                word: "ability",
                pronunciation: "/əˈbɪləti/",
                options: [
                    { text: "n. 能力，才能", correct: true },
                    { text: "v. 放弃，抛弃", correct: false },
                    { text: "adj. 能够的", correct: false },
                    { text: "n. 可能性", correct: false }
                ]
            },
            {
                word: "absolute",
                pronunciation: "/ˈæbsəluːt/",
                options: [
                    { text: "adj. 绝对的，完全的", correct: true },
                    { text: "v. 解决，解答", correct: false },
                    { text: "n. 摘要，概要", correct: false },
                    { text: "adj. 抽象的", correct: false }
                ]
            }
            // 更多题目...
        ];
        
        let currentQuestion = 0;
        let totalQuestions = 10;
        let selectedOption = null;
        let answered = false;
        
        // 初始化
        function init() {
            updateProgress();
            document.getElementById('completion').textContent = `共${totalQuestions}题，完成后自动生成报告`;
        }
        
        // 更新进度
        function updateProgress() {
            const progress = ((currentQuestion + 1) / totalQuestions * 100).toFixed(0);
            document.getElementById('progressText').textContent = `诊断测试 · 第${currentQuestion + 1}题/${totalQuestions}题`;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }
        
        // 选择选项
        function selectOption(element) {
            if (answered) return;
            
            selectedOption = parseInt(element.getAttribute('data-index'));
            
            // 清除之前的选择
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 设置新的选择
            element.classList.add('selected');
            
            // 立即验证答案
            setTimeout(() => {
                validateAnswer();
            }, 300);
        }
        
        // 验证答案
        function validateAnswer() {
            if (selectedOption === null || answered) return;
            
            answered = true;
            
            const options = document.querySelectorAll('.option');
            const correctIndex = Array.from(options).findIndex(opt => opt.getAttribute('data-correct') === 'true');
            
            // 标记正确选项
            options[correctIndex].classList.add('correct');
            
            // 如果选错了，标记错误选项
            if (selectedOption !== correctIndex) {
                options[selectedOption].classList.add('wrong');
                document.getElementById('feedback').textContent = "回答错误";
                document.getElementById('feedback').className = "feedback wrong";
            } else {
                document.getElementById('feedback').textContent = "回答正确！";
                document.getElementById('feedback').className = "feedback correct";
            }
            
            // 显示下一题按钮
            setTimeout(() => {
                document.getElementById('nextBtn').classList.add('show');
            }, 500);
            
            // 如果是最后一题，自动跳转
            if (currentQuestion + 1 >= totalQuestions) {
                document.getElementById('nextBtn').textContent = "查看诊断报告";
                document.getElementById('completion').textContent = "诊断测试完成！正在生成报告...";
                
                // 3秒后自动跳转
                setTimeout(() => {
                    completeTest();
                }, 3000);
            }
        }
        
        // 下一题
        function nextQuestion() {
            if (!answered) return;
            
            currentQuestion++;
            
            if (currentQuestion >= totalQuestions) {
                completeTest();
                return;
            }
            
            // 重置状态
            resetQuestion();
            
            // 更新题目（这里简化，实际应该从testData中获取）
            if (currentQuestion < testData.length) {
                const question = testData[currentQuestion];
                document.getElementById('word').textContent = question.word;
                document.getElementById('pronunciation').textContent = question.pronunciation;
                
                const optionsContainer = document.getElementById('options');
                optionsContainer.innerHTML = '';
                
                question.options.forEach((opt, index) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.setAttribute('data-index', index);
                    if (opt.correct) optionDiv.setAttribute('data-correct', 'true');
                    optionDiv.textContent = opt.text;
                    optionDiv.onclick = () => selectOption(optionDiv);
                    optionsContainer.appendChild(optionDiv);
                });
            }
            
            updateProgress();
        }
        
        // 重置题目状态
        function resetQuestion() {
            selectedOption = null;
            answered = false;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('nextBtn').classList.remove('show');
        }
        
        // 完成测试
        function completeTest() {
            console.log("诊断测试完成，跳转到报告页");
            alert("✅ 诊断测试完成！正在生成个性化报告...");
            
            // 实际跳转
            // window.location.href = '03_诊断报告页.html';
            
            // 模拟跳转
            setTimeout(() => {
                alert("跳转到诊断报告页");
            }, 1000);
        }
        
        // 事件委托
        document.getElementById('options').addEventListener('click', (e) => {
            if (e.target.classList.contains('option')) {
                selectOption(e.target);
            }
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (answered) return;
            
            // 数字键1-4选择选项
            if (e.code >= 'Digit1' && e.code <= 'Digit4') {
                const index = parseInt(e.code.slice(-1)) - 1;
                const option = document.querySelector(`.option[data-index="${index}"]`);
                if (option) selectOption(option);
            }
        });
        
        // 初始化
        init();
        
        console.log("🎯 诊断答题页改进特点：");
        console.log("1. 即时反馈：选择后立即显示对错（红/绿框）");
        console.log("2. 自动出现按钮：验证后自动显示'下一题'按钮");
        console.log("3. 错误高亮：答错时高亮正确选项");
        console.log("4. 自动跳转：10题完成后自动跳转报告页");
        console.log("5. 进度显示：实时显示答题进度");
        console.log("6. 键盘支持：数字键1-4快速选择");
    </script>
</body>
</html>
